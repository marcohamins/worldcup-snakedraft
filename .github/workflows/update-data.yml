name: Update tournament data

# Poll football-data.org every 5 minutes (4 API calls per run).
# At ~288 runs/day that averages ~0.8 requests/min — under the ~10/min limit.
# Successful runs trigger "Deploy to GitHub Pages" via workflow_run.
#
# Manual run: GitHub → Actions → "Update tournament data" → Run workflow

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch latest World Cup data
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: npm run update-data

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/teams.json data/standings.json data/history.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore: update tournament data"
          git push

name: Update tournament data

# Scheduled refreshes for match windows (US Eastern Daylight Time, UTC-4).
# Each run = 4 API calls (well under football-data.org ~10/min limit).
#
# Pre-kickoff (~20 min before):  11:50, 12:50,  2:50,  3:50,  5:50,  6:50,  8:50,  9:50, 11:50 PM
# Post-match (~2h15 after):      2:15,  3:15,  5:15,  6:15,  8:15,  9:15, 11:15 PM, 12:15,  2:15 AM
#
# Local (EDT) → UTC cron (pre / post)
#  11:50 AM → 15:50 /  2:15 PM → 18:15
#  12:50 PM → 16:50 /  3:15 PM → 19:15
#   2:50 PM → 18:50 /  5:15 PM → 21:15
#   3:50 PM → 19:50 /  6:15 PM → 22:15
#   5:50 PM → 21:50 /  8:15 PM → 00:15
#   6:50 PM → 22:50 /  9:15 PM → 01:15
#   8:50 PM → 00:50 / 11:15 PM → 03:15
#   9:50 PM → 01:50 / 12:15 AM → 04:15
#  11:50 PM → 03:50 /  2:15 AM → 06:15
#
# Manual run: GitHub → Actions → "Update tournament data" → Run workflow

on:
  schedule:
    # Pre-kickoff
    - cron: "50 15 * * *"
    - cron: "50 16 * * *"
    - cron: "50 18 * * *"
    - cron: "50 19 * * *"
    - cron: "50 21 * * *"
    - cron: "50 22 * * *"
    - cron: "50 0 * * *"
    - cron: "50 1 * * *"
    - cron: "50 3 * * *"
    # Post-match (results usually final)
    - cron: "15 18 * * *"
    - cron: "15 19 * * *"
    - cron: "15 21 * * *"
    - cron: "15 22 * * *"
    - cron: "15 0 * * *"
    - cron: "15 1 * * *"
    - cron: "15 3 * * *"
    - cron: "15 4 * * *"
    - cron: "15 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch latest World Cup data
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: npm run update-data

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/teams.json data/standings.json data/history.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore: update tournament data"
          git push
